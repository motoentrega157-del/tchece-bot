<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel 2D - Agentes Trabalhando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-panel { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* 2D Room Styles */
        .room-container {
            position: relative;
            width: 100%;
            height: 500px;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            border: 4px solid #334155;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }
        
        .floor-grid {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 60%;
            background-image: 
                linear-gradient(rgba(51, 65, 85, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(51, 65, 85, 0.5) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(600px) rotateX(60deg);
            transform-origin: top;
            opacity: 0.3;
        }

        .agent-desk {
            position: absolute;
            width: 120px;
            text-align: center;
            transition: all 0.3s ease;
        }

        /* Sprite do Agente */
        .agent-avatar {
            width: 60px; height: 60px;
            margin: 0 auto;
            background: #1e293b;
            border: 3px solid #475569;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
        }

        .desk-base {
            width: 100px; height: 30px;
            background: #334155;
            border-radius: 8px;
            margin: -10px auto 0;
            border-top: 3px solid #64748b;
            box-shadow: 0 8px 10px rgba(0,0,0,0.4);
            position: relative;
            z-index: 5;
        }

        .screen {
            position: absolute;
            top: -20px; right: -10px;
            width: 30px; height: 25px;
            background: #0f172a;
            border: 2px solid #94a3b8;
            border-radius: 4px;
            z-index: 8;
        }

        /* Animação quando está trabalhando */
        .working .agent-avatar {
            border-color: #3b82f6;
            box-shadow: 0 0 20px #3b82f6;
            animation: bounce 1s infinite alternate;
        }
        .working .screen {
            background: #3b82f6;
            box-shadow: 0 0 10px #3b82f6;
            animation: pulse-screen 0.5s infinite alternate;
        }

        /* Posições na sala */
        #agent-gemini { bottom: 30%; left: 15%; }
        #agent-pillow { bottom: 45%; left: 50%; transform: translateX(-50%); }
        #agent-poster { bottom: 30%; right: 15%; }

        /* Speech Bubble */
        .speech-bubble {
            position: absolute;
            top: -50px; left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #0f172a;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 20;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -5px; left: 50%;
            transform: translateX(-50%);
            border-width: 5px 5px 0;
            border-style: solid;
            border-color: #fff transparent transparent transparent;
        }
        .show-bubble { opacity: 1; top: -60px; animation: float-bubble 2s ease-in-out; }

        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-5px); } }
        @keyframes pulse-screen { from { opacity: 0.7; } to { opacity: 1; } }
        @keyframes float-bubble { 0%{opacity:0; transform:translateX(-50%) translateY(10px);} 10%{opacity:1; transform:translateX(-50%) translateY(0);} 90%{opacity:1; transform:translateX(-50%) translateY(0);} 100%{opacity:0; transform:translateX(-50%) translateY(-10px);} }

        /* Scroller do Terminal */
        #log-output { font-family: 'Courier New', Courier, monospace; font-size: 0.85em; }
        .log-container { max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body class="min-h-screen p-4">

<div class="max-w-6xl mx-auto space-y-6">
    <!-- Header -->
    <header class="glass-panel p-4 rounded-xl flex flex-col md:flex-row justify-between items-center">
        <div>
            <h1 class="text-xl font-bold text-white"><i class="fas fa-building mr-2 text-blue-400"></i> Agência Tchê Celulares</h1>
            <p class="text-slate-400 text-sm">Status Geral: <span id="ws-status-text" class="text-emerald-400">Conectado ao QG</span></p>
        </div>
        <div class="mt-4 md:mt-0 flex space-x-4">
            <button onclick="gerarPost()" class="px-5 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg font-bold transition shadow-lg flex items-center">
                <i class="fas fa-power-off mr-2"></i> Iniciar Expediente
            </button>
        </div>
    </header>

    <!-- A Sala 2D -->
    <div class="room-container">
        <!-- Título na parede -->
        <div class="absolute top-6 left-0 right-0 text-center opacity-30">
            <h2 class="text-4xl font-black uppercase tracking-widest text-slate-500">Operações</h2>
        </div>

        <div class="floor-grid"></div>

        <!-- Agente 1: Gemini (Copywriter) -->
        <div id="agent-gemini" class="agent-desk">
            <div class="speech-bubble" id="bubble-gemini">Pensando...</div>
            <div class="agent-avatar"><i class="fas fa-brain text-purple-400"></i></div>
            <div class="desk-base"><div class="screen text-blue-500 flex items-center justify-center text-[10px]"><i class="fas fa-code"></i></div></div>
            <p class="text-xs font-bold text-slate-300 mt-2">1. Copywriter (IA)</p>
            <p class="text-[10px] text-slate-500" id="status-gemini">Aguardando pauta</p>
        </div>

        <!-- Agente 2: Pillow (Designer) -->
        <div id="agent-pillow" class="agent-desk">
            <div class="speech-bubble" id="bubble-pillow">Desenhando...</div>
            <div class="agent-avatar"><i class="fas fa-paint-brush text-pink-400"></i></div>
            <div class="desk-base"><div class="screen text-blue-500 flex items-center justify-center text-[10px]"><i class="fas fa-image"></i></div></div>
            <p class="text-xs font-bold text-slate-300 mt-2">2. Designer (Pillow)</p>
            <p class="text-[10px] text-slate-500" id="status-pillow">Pincéis limpos</p>
        </div>

        <!-- Agente 3: Instagram (Publisher) -->
        <div id="agent-poster" class="agent-desk">
            <div class="speech-bubble" id="bubble-poster">Postando...</div>
            <div class="agent-avatar"><i class="fab fa-instagram text-orange-400"></i></div>
            <div class="desk-base"><div class="screen text-blue-500 flex items-center justify-center text-[10px]"><i class="fas fa-mobile-alt"></i></div></div>
            <p class="text-xs font-bold text-slate-300 mt-2">3. Publisher (Insta)</p>
            <p class="text-[10px] text-slate-500" id="status-poster">Online</p>
        </div>
    </div>

    <!-- Interface Inferior (Logs e Pendentes) -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Logs Globais -->
        <div class="glass-panel rounded-xl overflow-hidden flex flex-col h-64">
            <div class="bg-slate-800 px-4 py-2 border-b border-slate-700 font-semibold text-sm">
                <i class="fas fa-list-alt text-slate-400 mr-2"></i> Log de Tarefas
            </div>
            <div class="p-3 log-container flex-1" id="log-box">
                <ul id="log-output" class="space-y-1 text-slate-300"></ul>
            </div>
        </div>

        <!-- Pendencias -->
        <div class="glass-panel p-4 rounded-xl flex flex-col h-64 overflow-y-auto">
            <h2 class="text-sm font-bold border-b border-slate-700 pb-2 mb-3">
                <i class="fas fa-check-double text-emerald-400 mr-2"></i> Gaveta de Aprovação
                <span id="badge-pendentes" class="ml-2 bg-red-500 text-white text-xs px-2 py-0.5 rounded-full">0</span>
            </h2>
            <div id="posts-container" class="space-y-3">
                <p class="text-xs text-slate-500 text-center py-8">A mesa está limpa.</p>
            </div>
        </div>
    </div>
</div>

<script>
    let ws;
    
    // Funções visuais da sala 2D
    function setAgentState(agentId, isWorking, statusText, bubbleSpeech = null) {
        const desk = document.getElementById(`agent-${agentId}`);
        const statusLabel = document.getElementById(`status-${agentId}`);
        const bubble = document.getElementById(`bubble-${agentId}`);

        if (isWorking) {
            desk.classList.add('working');
            statusLabel.className = 'text-[10px] text-blue-400 font-bold';
        } else {
            desk.classList.remove('working');
            statusLabel.className = 'text-[10px] text-slate-500';
        }
        statusLabel.innerText = statusText;

        if (bubbleSpeech) {
            bubble.innerText = bubbleSpeech;
            bubble.classList.remove('show-bubble');
            void bubble.offsetWidth; // trigger reflow
            bubble.classList.add('show-bubble');
        }
    }

    function resetRoom() {
        setAgentState('gemini', false, 'Aguardando pauta');
        setAgentState('pillow', false, 'Pincéis limpos');
        setAgentState('poster', false, 'Online');
    }

    // Configuração WebSocket e Logica
    function connectWS() {
        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
        
        ws.onopen = () => {
            document.getElementById('ws-status-text').innerText = "Conectado à Base";
            document.getElementById('ws-status-text').className = "text-emerald-400 font-bold";
            carregarPendentes();
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if(data.tipo === "log") {
                addLog(data.dados);
                
                // Parser de inteligência do texto para animar a sala
                const txt = data.dados.toLowerCase();
                if (txt.includes("preparando conteúdo") || txt.includes("gerando textos") || txt.includes("pensando")) {
                    setAgentState('gemini', true, 'Escrevendo Copy', 'Escrevendo ideias brutais! 🧠');
                    setAgentState('pillow', false, 'Aguardando textos');
                } 
                else if (txt.includes("criando imagem") || txt.includes("desenhando") || txt.includes("pillow")) {
                    setAgentState('gemini', false, 'Descansando');
                    setAgentState('pillow', true, 'Renderizando', 'Desenhando a arte! 🎨');
                }
                else if (txt.includes("publicando") || txt.includes("instagram")) {
                    setAgentState('pillow', false, 'Arte finalizada');
                    setAgentState('poster', true, 'Enviando p/ Meta', 'Subindo pro Insta! 📲');
                }
                else if (txt.includes("publicado no instagram")) {
                    setAgentState('poster', false, 'Post publicado');
                    reproduzirSucesso();
                }
                else if (txt.includes("imagem criada")) {
                    setAgentState('pillow', false, 'Aguardando você');
                }

            } else if (data.tipo === "status") {
                if (data.dados === "working") {
                    addLog("🚨 Novo ciclo de trabalho iniciado.");
                } else if (data.dados === "idle") {
                    // Espera 2s e limpa a sala
                    setTimeout(resetRoom, 3000);
                }
            } else if (data.tipo === "novo_post" || data.tipo === "post_atualizado") {
                carregarPendentes();
            }
        };

        ws.onclose = () => {
            document.getElementById('ws-status-text').innerText = "Sem Conexão";
            document.getElementById('ws-status-text').className = "text-red-500 font-bold";
            setTimeout(connectWS, 3000);
        };
    }

    function addLog(msg) {
        const ul = document.getElementById("log-output");
        const li = document.createElement("li");
        li.innerHTML = `<span class="text-blue-400">></span> ${msg}`;
        ul.appendChild(li);
        const box = document.getElementById("log-box");
        box.scrollTop = box.scrollHeight;
    }

    async function carregarPendentes() {
        const res = await fetch("/api/pendentes");
        if(res.status === 401) return;
        const posts = await res.json();
        const container = document.getElementById("posts-container");
        document.getElementById("badge-pendentes").innerText = posts.length;
        
        if (posts.length === 0) {
            container.innerHTML = `<p class="text-xs text-slate-500 text-center py-8">A mesa está limpa.</p>`;
            return;
        }

        let html = "";
        posts.forEach(p => {
            html += `
            <div class="bg-slate-900 border border-slate-700 p-3 rounded-lg flex items-start space-x-3 mb-2">
                <img src="${p.imagem_url}?t=${Date.now()}" class="w-16 h-24 object-cover rounded bg-black">
                <div class="flex-1">
                    <p class="text-xs font-bold text-blue-300">${p.titulo.substring(0,30)}...</p>
                    <textarea id="legenda-${p.id}" class="w-full text-[10px] bg-slate-800 border border-slate-600 rounded mt-1 p-1 h-12 outline-none">${p.legenda}</textarea>
                    <div class="flex space-x-2 mt-2">
                        <button onclick="aprovar(${p.id})" class="bg-emerald-600 hover:bg-emerald-500 text-white text-[10px] font-bold py-1 px-2 rounded w-full"><i class="fas fa-check"></i> Aprovar</button>
                        <button onclick="rejeitar(${p.id})" class="bg-rose-600 hover:bg-rose-500 text-white text-[10px] font-bold py-1 px-2 rounded w-full"><i class="fas fa-trash"></i> Lixo</button>
                    </div>
                </div>
            </div>`;
        });
        container.innerHTML = html;
        
        // Se apareceu post, anima a sala pra chamar atenção
        if(posts.length > 0) {
            setAgentState('pillow', false, 'Aguardando você', 'Chefe, aprova aí! 📄');
        }
    }

    async function gerarPost() {
        await fetch("/api/gerar", { method: "POST" });
    }

    async function aprovar(id) {
        if(!confirm("Publicar no Instagram agora?")) return;
        const leg = document.getElementById(`legenda-${id}`).value;
        const res = await fetch(`/api/aprovar/${id}`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ legenda: leg })
        });
        if(res.ok) { carregarPendentes(); } else { alert("Erro ao postar"); }
    }

    async function rejeitar(id) {
        if(!confirm("Deletar?")) return;
        await fetch(`/api/rejeitar/${id}`, { method: "POST" });
        carregarPendentes();
    }

    function reproduzirSucesso() {
        // Efeito bobo na sala
        document.querySelector('.room-container').style.boxShadow = 'inset 0 0 100px rgba(16, 185, 129, 0.5)';
        setTimeout(() => {
            document.querySelector('.room-container').style.boxShadow = 'inset 0 0 50px rgba(0,0,0,0.5)';
        }, 1000);
    }

    connectWS();
</script>

</body>
</html>
