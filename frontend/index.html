<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Bot - Tchê Celulares</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .log-container { max-height: 200px; overflow-y: auto; scroll-behavior: smooth; }
        #log-output { font-family: 'Courier New', Courier, monospace; font-size: 0.9em; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

<div class="max-w-6xl mx-auto space-y-6">
    <!-- Header -->
    <header class="glass-panel p-6 rounded-2xl flex flex-col md:flex-row justify-between items-center shadow-lg">
        <div class="flex items-center space-x-4">
            <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-xl font-bold">🤖</div>
            <div>
                <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">Tchê Celulares - Auto Bot</h1>
                <p class="text-slate-400 text-sm">Status: <span id="bot-status" class="text-emerald-400 font-semibold">Online & Aguardando</span></p>
            </div>
        </div>
        <div class="mt-4 md:mt-0 flex space-x-3">
            <button onclick="gerarPost()" class="px-6 py-2 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 rounded-xl font-semibold transition-all shadow-lg transform hover:scale-105 flex items-center">
                <i class="fas fa-magic mr-2"></i> Criar Agora
            </button>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Esquerda: Logs e Configs -->
        <div class="space-y-6">
            <!-- Terminal de Logs -->
            <div class="glass-panel rounded-2xl overflow-hidden flex flex-col h-64">
                <div class="bg-slate-800/80 px-4 py-2 border-b border-slate-700 flex justify-between items-center text-sm font-semibold text-slate-300">
                    <span><i class="fas fa-terminal cursor-pointer mr-2"></i> Terminal de Logs</span>
                    <span id="ws-status" class="w-3 h-3 rounded-full bg-red-500"></span>
                </div>
                <div class="p-4 log-container flex-1" id="log-box">
                    <ul id="log-output" class="space-y-1 text-slate-300">
                        <!-- Logs injectados aqui -->
                    </ul>
                </div>
            </div>

            <!-- Agendamento -->
            <div class="glass-panel p-6 rounded-2xl">
                <h2 class="text-lg font-bold mb-4 flex items-center"><i class="far fa-clock mr-2 text-blue-400"></i> Horários Fixos</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Upload da Manhã</label>
                        <input type="time" id="hora-manha" class="w-full bg-slate-900 border border-slate-700 text-white rounded p-2 focus:ring focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Upload da Tarde</label>
                        <input type="time" id="hora-noite" class="w-full bg-slate-900 border border-slate-700 text-white rounded p-2 focus:ring focus:ring-blue-500 focus:outline-none">
                    </div>
                </div>
                <button onclick="salvarHorarios()" class="mt-4 w-full py-2 bg-slate-800 hover:bg-slate-700 text-sm rounded-lg font-semibold transition-colors border border-slate-600">Salvar Horários</button>
            </div>
        </div>

        <!-- Direita: Aprovações Pendentes -->
        <div class="lg:col-span-2 glass-panel p-6 rounded-2xl min-h-[500px]">
            <h2 class="text-xl font-bold mb-6 flex items-center border-b border-slate-700 pb-3">
                <i class="fas fa-check-double mr-2 text-emerald-400"></i> Fila de Aprovação
                <span id="badge-pendentes" class="ml-3 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full">0</span>
            </h2>
            
            <div id="posts-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="col-span-full text-center py-12 text-slate-500">
                    <i class="fas fa-inbox text-4xl mb-3 opacity-50"></i>
                    <p>Nenhum story pendente para aprovação no momento.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Conectar WebSocket
    let ws;
    function connectWS() {
        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
        
        ws.onopen = () => {
            document.getElementById('ws-status').className = 'w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]';
            addLog("🟢 Conectado ao servidor.");
            carregarDados();
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.tipo === "log") {
                addLog(data.dados);
            } else if (data.tipo === "status") {
                const badge = document.getElementById("bot-status");
                if (data.dados === "working") {
                    badge.innerText = "Criando Conteúdo...";
                    badge.className = "text-yellow-400 font-bold animate-pulse";
                } else {
                    badge.innerText = "Online & Pronto";
                    badge.className = "text-emerald-400 font-semibold";
                }
            } else if (data.tipo === "novo_post" || data.tipo === "post_atualizado") {
                carregarPendentes(); // Recarrega se chegou algo novo
            }
        };

        ws.onclose = () => {
            document.getElementById('ws-status').className = 'w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_#ef4444]';
            setTimeout(connectWS, 3000); // Tentar reconectar
        };
    }

    function addLog(msg) {
        const ul = document.getElementById("log-output");
        const li = document.createElement("li");
        const hora = new Date().toLocaleTimeString('pt-BR', { hour12: false });
        li.innerHTML = `<span class="text-slate-500">[${hora}]</span> <span class="text-slate-200">${msg}</span>`;
        ul.appendChild(li);
        const box = document.getElementById("log-box");
        box.scrollTop = box.scrollHeight;
    }

    // Carregar Inicial
    async function carregarDados() {
        try {
            const hRes = await fetch("/api/horarios");
            const hData = await hRes.json();
            document.getElementById("hora-manha").value = hData.hora_manha;
            document.getElementById("hora-noite").value = hData.hora_noite;
            await carregarPendentes();
        } catch(e) {
            console.error("Falta credenciais ou servidor fora");
        }
    }

    // Pendentes
    async function carregarPendentes() {
        const res = await fetch("/api/pendentes");
        if(res.status === 401) {
            // navegador pedirá login basic
            return;
        }
        const posts = await res.json();
        const container = document.getElementById("posts-container");
        document.getElementById("badge-pendentes").innerText = posts.length;
        
        if (posts.length === 0) {
            container.innerHTML = `
                <div class="col-span-full text-center py-12 text-slate-500">
                    <i class="fas fa-inbox text-4xl mb-3 opacity-50"></i>
                    <p>Nenhum story pendente para aprovação no momento.</p>
                </div>
            `;
            return;
        }

        let html = "";
        posts.forEach(p => {
            html += `
            <div class="bg-slate-800/50 border border-slate-700 rounded-xl overflow-hidden hover:border-blue-500/50 transition-colors flex flex-col">
                <div class="h-48 overflow-hidden bg-black flex items-center justify-center relative group">
                    <img src="${p.imagem_url}?t=${Date.now()}" class="h-full object-contain mx-auto transition-transform group-hover:scale-105">
                    <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                        <a href="${p.imagem_url}" target="_blank" class="px-4 py-2 bg-white/20 hover:bg-white/40 rounded-lg backdrop-blur-sm text-sm font-bold text-white"><i class="fas fa-search-plus"></i> Ampliar</a>
                    </div>
                </div>
                <div class="p-4 flex-1 flex flex-col">
                    <h3 class="font-bold text-blue-300 mb-1 text-sm">${p.titulo}</h3>
                    <textarea id="legenda-${p.id}" class="w-full text-xs text-slate-300 bg-slate-900 border border-slate-700 rounded p-2 mb-3 outline-none focus:border-blue-500 flex-1 resize-none" rows="3">${p.legenda}</textarea>
                    
                    <div class="flex space-x-2 mt-auto">
                        <button onclick="aprovar(${p.id})" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-2 rounded text-sm transition-colors shadow-lg"><i class="fas fa-upload mr-1"></i> Postar</button>
                        <button onclick="rejeitar(${p.id})" class="flex-1 bg-rose-600 hover:bg-rose-500 text-white font-bold py-2 px-2 rounded text-sm transition-colors shadow-lg"><i class="fas fa-trash-alt mr-1"></i> Descartar</button>
                    </div>
                </div>
            </div>`;
        });
        container.innerHTML = html;
    }

    // Ações
    async function gerarPost() {
        const btn = document.querySelector("button i.fa-magic").parentNode;
        btn.classList.add("opacity-50", "cursor-not-allowed");
        await fetch("/api/gerar", { method: "POST" });
        setTimeout(() => btn.classList.remove("opacity-50", "cursor-not-allowed"), 2000);
    }

    async function aprovar(id) {
        if(!confirm("Tem certeza que quer postar isso agora no Instagram da loja?")) return;
        const novaLegenda = document.getElementById(`legenda-${id}`).value;
        addLog(`⏳ Enviando post #${id} para o Instagram...`);
        const res = await fetch(`/api/aprovar/${id}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ legenda: novaLegenda })
        });
        if(res.ok) {
            alert("✓ Postado com sucesso no Instagram!");
            carregarPendentes();
        } else {
            const err = await res.json();
            alert("Erro: " + err.detail);
        }
    }

    async function rejeitar(id) {
        if(!confirm("A foto/story será deletado. Confirma?")) return;
        await fetch(`/api/rejeitar/${id}`, { method: "POST" });
        carregarPendentes();
    }

    async function salvarHorarios() {
        const manha = document.getElementById("hora-manha").value;
        const noite = document.getElementById("hora-noite").value;
        await fetch("/api/horarios", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ hora_manha: manha, hora_noite: noite })
        });
        alert("⏱️ Horários atualizados com sucesso!");
    }

    connectWS();
</script>

</body>
</html>
